name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        run: |
          pytest tests/test_fusion.py -v --tb=short --cov=hy_memory_fusion --cov-report=term-missing

      - name: Type check (optional)
        continue-on-error: true
        run: |
          pip install pyright
          pyright hy_memory_fusion/ --outputjson || true

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:6333/readyz')" 2>/dev/null; then
              echo "Qdrant ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Qdrant not ready after 30s"
          exit 1

      - name: Run integration tests
        env:
          FUSION_QDRANT_URL: http://localhost:6333
        run: |
          pytest tests/test_integration.py -v --tb=short

  benchmarks:
    runs-on: ubuntu-latest
    needs: unit-tests

    services:
      qdrant:
        image: qdrant/qdrant:v1.12.1
        ports:
          - 6333:6333

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Wait for Qdrant
        run: |
          for i in $(seq 1 30); do
            if python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:6333/readyz')" 2>/dev/null; then
              echo "Qdrant ready after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "Qdrant not ready after 30s"
          exit 1

      - name: Run benchmarks
        env:
          FUSION_QDRANT_URL: http://localhost:6333
        run: |
          pytest tests/test_benchmarks.py -v --tb=short -s
